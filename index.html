<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrispen's Checkers</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e0e0e;
            --panel: #1a1a1a;
            --border: #2e2e2e;
            --board-dark: #b58863;
            --board-light: #f0d9b5;
            --red-piece: #c0392b;
            --red-hi: #e74c3c;
            --black-piece: #1c1c1c;
            --black-hi: #444;
            --gold: #d4a84b;
            --text: #f0ece4;
            --muted: #888;
            --hint: rgba(100, 220, 120, 0.55);
            --hint-jump: rgba(255, 200, 50, 0.65);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px 40px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -1px;
            color: var(--gold);
            margin-bottom: 4px;
        }
        .subtitle { font-size: 0.72rem; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; }

        .tabs { display: flex; gap: 6px; margin-bottom: 18px; }
        .tab-btn {
            padding: 8px 22px; border-radius: 4px; border: 1px solid var(--border);
            background: transparent; color: var(--muted); font-family: 'DM Mono', monospace;
            font-size: 0.78rem; cursor: pointer; letter-spacing: 1px; transition: all 0.2s;
        }
        .tab-btn.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 500; }

        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; margin-bottom: 18px; width: 100%; max-width: 520px; }
        .panel h3 { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--gold); margin-bottom: 10px; }

        .conn-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
        .id-badge {
            background: #222; border: 1px solid var(--border); border-radius: 4px;
            padding: 6px 12px; font-size: 1rem; letter-spacing: 4px; color: var(--gold); font-weight: 500;
        }
        input {
            padding: 8px 12px; border-radius: 4px; border: 1px solid var(--border);
            background: #111; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.85rem;
            width: 130px; text-align: center; outline: none;
        }
        button.btn {
            padding: 8px 16px; background: var(--gold); border: none; color: #000;
            border-radius: 4px; cursor: pointer; font-family: 'DM Mono', monospace;
            font-size: 0.82rem; font-weight: 500;
        }

        #conn-status {
            font-size: 0.78rem; padding: 6px 10px; border-radius: 4px;
            background: #111; border-left: 3px solid var(--muted); color: var(--muted);
        }
        #conn-status.ok { border-color: #4caf50; color: #4caf50; }
        #conn-status.err { border-color: #e74c3c; color: #e74c3c; }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 58px);
            grid-template-rows: repeat(8, 58px);
            border: 3px solid #333;
            box-shadow: 0 8px 40px rgba(0,0,0,0.7);
        }
        #board.flipped { transform: rotate(180deg); }

        .square { width: 58px; height: 58px; display: flex; justify-content: center; align-items: center; position: relative; }
        .white-sq { background-color: var(--board-light); }
        .black-sq { background-color: var(--board-dark); }
        
        .hint-sq::after { content: ''; position: absolute; width: 16px; height: 16px; border-radius: 50%; background: var(--hint); }
        .hint-jump-sq::after { content: ''; position: absolute; inset: 4px; border: 2px solid var(--hint-jump); border-radius: 2px; }

        .piece {
            width: 46px; height: 46px; border-radius: 50%; cursor: pointer;
            display: flex; justify-content: center; align-items: center; font-size: 20px;
            transition: transform 0.1s; z-index: 5;
        }
        .piece.red { background: radial-gradient(circle at 35% 35%, var(--red-hi), var(--red-piece)); border: 2px solid #7a1515; }
        .piece.black { background: radial-gradient(circle at 35% 35%, #555, var(--black-piece)); border: 2px solid #000; }
        .piece.selected { outline: 3px solid #ffe600; transform: scale(1.1); }
        #board.flipped .piece { transform: rotate(180deg); }

        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 99; backdrop-filter: blur(4px); }
        #win-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--panel); border: 1px solid var(--border); padding: 30px; border-radius: 10px; text-align: center; z-index: 100;
        }
        
        #status-bar { display: flex; width: 100%; max-width: 464px; margin-bottom: 10px; font-size: 0.85rem; }
        .turn-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .turn-dot.black { background: #333; }
        .turn-dot.red { background: var(--red-piece); }
    </style>
</head>
<body>

<div id="overlay"></div>
<div id="win-modal">
    <h2 id="winner-text">Black Wins!</h2>
    <p id="winner-sub" style="margin: 10px 0 20px; color: var(--muted);"></p>
    <button class="btn" onclick="resetGame(true)">Play Again</button>
</div>

<h1>Chrispen's Checkers</h1>
<p class="subtitle">Classic Board Game</p>

<div class="tabs">
    <button class="tab-btn active" id="tab-online" onclick="switchMode('online')">⚡ Online</button>
    <button class="tab-btn" id="tab-ai" onclick="switchMode('ai')">🤖 vs AI</button>
    <button class="tab-btn" id="tab-local" onclick="switchMode('local')">👥 Local</button>
</div>

<div id="panel-online" class="panel">
    <h3>Multiplayer</h3>
    <div class="conn-row">
        <span style="font-size:0.75rem;color:var(--muted)">Your ID:</span>
        <span class="id-badge" id="my-id">....</span>
    </div>
    <div class="conn-row">
        <input type="text" id="peer-id-input" placeholder="Friend's ID">
        <button class="btn" onclick="connectToFriend()">Join</button>
        <button class="btn secondary" style="background:#333; color:white;" onclick="resetGame(true)">Reset</button>
    </div>
    <div id="conn-status">Ready to connect</div>
</div>

<div id="panel-ai" class="panel" style="display:none">
    <h3>vs Computer</h3>
    <button class="btn" onclick="resetGame(false)">Start New Game</button>
</div>

<div id="panel-local" class="panel" style="display:none">
    <h3>Local Pass & Play</h3>
    <button class="btn" onclick="resetGame(false)">Start New Game</button>
</div>

<div id="status-bar">
    <div id="turn-indicator">
        <div class="turn-dot black" id="turn-dot"></div>
        <span id="turn-text">Black's Turn</span>
    </div>
    <div style="margin-left:auto" id="score-display">⬛ 12 | 🔴 12</div>
</div>

<div id="board"></div>

<script>
// --- CORE STATE ---
let board = [];
let turn = 'black';
let selected = null;
let mustJump = false;
let gameOver = false;
let myRole = null; 
let mode = 'online';
let conn = null;

const INIT_BOARD = [
    [' ','r',' ','r',' ','r',' ','r'],
    ['r',' ','r',' ','r',' ','r',' '],
    [' ','r',' ','r',' ','r',' ','r'],
    [' ',' ',' ',' ',' ',' ',' ',' '],
    [' ',' ',' ',' ',' ',' ',' ',' '],
    ['b',' ','b',' ','b',' ','b',' '],
    [' ','b',' ','b',' ','b',' ','b'],
    ['b',' ','b',' ','b',' ','b',' ']
];

// --- PEER JS SETUP ---
const peer = new Peer(Math.floor(1000 + Math.random() * 9000).toString());

peer.on('open', id => { document.getElementById('my-id').innerText = id; });

peer.on('connection', c => {
    conn = c;
    myRole = 'black';
    setupConn();
});

function connectToFriend() {
    const id = document.getElementById('peer-id-input').value.trim();
    if (!id) return;
    setStatus('Connecting...', '');
    conn = peer.connect(id);
    myRole = 'red';
    setupConn();
}

function setupConn() {
    conn.on('open', () => {
        setStatus(`Connected as ${myRole.toUpperCase()}`, 'ok');
        if (myRole === 'black') {
            conn.send({ type: 'init', board: board, turn: turn });
        }
    });
    conn.on('data', data => {
        if (data.type === 'move' || data.type === 'init') {
            board = data.board;
            turn = data.turn;
            mustJump = data.mustJump || false;
            render();
            checkWinner();
        } else if (data.type === 'reset') {
            doReset();
        }
    });
}

function setStatus(m, cls) {
    const s = document.getElementById('conn-status');
    s.innerText = m;
    s.className = cls === 'ok' ? 'ok' : '';
}

// --- GAME LOGIC ---
function doReset() {
    board = INIT_BOARD.map(r => [...r]);
    turn = 'black';
    selected = null;
    mustJump = false;
    gameOver = false;
    document.getElementById('win-modal').style.display = 'none';
    document.getElementById('overlay').style.display = 'none';
    render();
}

function render() {
    const boardEl = document.getElementById('board');
    boardEl.innerHTML = '';
    boardEl.classList.toggle('flipped', mode === 'online' && myRole === 'red');

    const jumps = getAllMoves(turn).filter(m => m.isJump);

    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
            const sq = document.createElement('div');
            sq.className = `square ${(r + c) % 2 === 0 ? 'white-sq' : 'black-sq'}`;
            
            const p = board[r][c];
            if (p !== ' ') {
                const piece = document.createElement('div');
                piece.className = `piece ${p.toLowerCase() === 'b' ? 'black' : 'red'}`;
                if (p === 'B' || p === 'R') piece.innerText = '♛';
                if (selected && selected.r === r && selected.c === c) piece.classList.add('selected');
                sq.appendChild(piece);
            }

            // Hints
            if (selected) {
                const move = getValidMoves(selected.r, selected.c).find(m => m.r === r && m.c === c);
                if (move) {
                    if (jumps.length > 0 && !move.isJump) { /* ignore */ }
                    else sq.classList.add(move.isJump ? 'hint-jump-sq' : 'hint-sq');
                }
            }

            sq.onclick = () => handleClick(r, c);
            boardEl.appendChild(sq);
        }
    }

    document.getElementById('turn-text').innerText = `${turn.toUpperCase()}'s Turn`;
    document.getElementById('turn-dot').className = `turn-dot ${turn}`;
    updateScore();
}

function handleClick(r, c) {
    if (gameOver) return;
    if (mode === 'online' && myRole !== turn) return;

    const p = board[r][c];
    if (p !== ' ' && p.toLowerCase() === turn[0]) {
        selected = { r, c };
        render();
        return;
    }

    if (selected) {
        const moves = getValidMoves(selected.r, selected.c);
        const move = moves.find(m => m.r === r && m.c === c);
        
        const jumps = getAllMoves(turn).filter(m => m.isJump);
        if (move && (jumps.length === 0 || move.isJump)) {
            executeMove(selected.r, selected.c, move);
            if (mode === 'online' && conn) {
                conn.send({ type: 'move', board, turn, mustJump });
            }
            render();
            checkWinner();
        } else {
            selected = null;
            render();
        }
    }
}

function getValidMoves(r, c) {
    const p = board[r][c];
    const moves = [];
    const ds = (p === 'B' || p === 'R') ? [[1,1],[1,-1],[-1,1],[-1,-1]] : (p === 'b' ? [[-1,1],[-1,-1]] : [[1,1],[1,-1]]);

    for (let [dr, dc] of ds) {
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8) {
            if (board[nr][nc] === ' ') {
                moves.push({ r: nr, c: nc, isJump: false });
            } else if (board[nr][nc].toLowerCase() !== p.toLowerCase()) {
                const jr = r + dr * 2, jc = c + dc * 2;
                if (jr >= 0 && jr < 8 && jc >= 0 && jc < 8 && board[jr][jc] === ' ') {
                    moves.push({ r: jr, c: jc, isJump: true, mr: nr, mc: nc });
                }
            }
        }
    }
    return moves;
}

function getAllMoves(color) {
    let moves = [];
    for (let r=0; r<8; r++) {
        for (let c=0; c<8; c++) {
            if (board[r][c].toLowerCase() === color[0]) {
                moves.push(...getValidMoves(r, c));
            }
        }
    }
    return moves;
}

function executeMove(r, c, move) {
    const p = board[r][c];
    board[move.r][move.c] = p;
    board[r][c] = ' ';
    if (move.isJump) board[move.mr][move.mc] = ' ';

    // Kinging
    if (move.r === 0 && p === 'b') board[move.r][move.c] = 'B';
    if (move.r === 7 && p === 'r') board[move.r][move.c] = 'R';

    // Multi-jump
    if (move.isJump) {
        const nextJumps = getValidMoves(move.r, move.c).filter(m => m.isJump);
        if (nextJumps.length > 0) {
            selected = { r: move.r, c: move.c };
            mustJump = true;
            return;
        }
    }

    selected = null;
    mustJump = false;
    turn = turn === 'black' ? 'red' : 'black';
}

function updateScore() {
    let b=0, r=0;
    board.flat().forEach(p => { if(p.toLowerCase()==='b') b++; if(p.toLowerCase()==='r') r++; });
    document.getElementById('score-display').innerText = `⬛ ${b} | 🔴 ${r}`;
}

function checkWinner() {
    const moves = getAllMoves(turn);
    if (moves.length === 0) {
        gameOver = true;
        const winner = turn === 'black' ? 'RED' : 'BLACK';
        document.getElementById('winner-text').innerText = `${winner} WINS!`;
        document.getElementById('winner-sub').innerText = 'No legal moves remaining.';
        document.getElementById('win-modal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }
}

function switchMode(m) {
    mode = m;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`tab-${m}`).classList.add('active');
    document.getElementById('panel-online').style.display = m === 'online' ? '' : 'none';
    document.getElementById('panel-ai').style.display = m === 'ai' ? '' : 'none';
    document.getElementById('panel-local').style.display = m === 'local' ? '' : 'none';
    doReset();
}

function resetGame(notify) {
    if (notify && conn) conn.send({ type: 'reset' });
    doReset();
}

// Start
doReset();

</script>
</body>
</html>
