<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrispen's Checkers</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #1a1a1a;
            --board-dark: #769656;
            --board-light: #eeeed2;
            --red-piece: #cc3333;
            --black-piece: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        #setup-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 200;
        }

        .card {
            background: #333; padding: 30px; border-radius: 12px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #connection-panel {
            background: #333; padding: 15px; border-radius: 8px;
            margin-bottom: 20px; text-align: center; width: 100%; max-width: 400px;
        }

        input { padding: 10px; border-radius: 4px; border: none; margin: 10px; width: 150px; text-align: center; font-size: 1rem; }
        button { padding: 10px 20px; background: #769656; border: none; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1rem;}
        button:hover { background: #658348; }

        #board { display: grid; grid-template-columns: repeat(8, 60px); grid-template-rows: repeat(8, 60px); border: 5px solid #444; }

        .square { width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; }
        .white-sq { background-color: var(--board-light); }
        .black-sq { background-color: var(--board-dark); }

        .piece {
            width: 45px; height: 45px; border-radius: 50%; cursor: pointer;
            display: flex; justify-content: center; align-items: center; font-size: 24px;
            box-shadow: inset 0 -3px 5px rgba(0,0,0,0.4), 0 2px 4px rgba(0,0,0,0.3);
        }
        .red { background-color: var(--red-piece); border: 2px solid #600; }
        .black { background-color: var(--black-piece); border: 2px solid #000; }
        .selected { outline: 4px solid yellow; z-index: 10; }
        
        #win-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; color: black; padding: 30px; border-radius: 10px; text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.8); z-index: 100;
        }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 99; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="card">
            <h1>Chrispen's Checkers</h1>
            <p>Enter your name to start:</p>
            <input type="text" id="user-name-input" placeholder="Your Name">
            <br>
            <button onclick="saveName()">Set Name</button>
        </div>
    </div>

    <div id="overlay"></div>
    <div id="win-modal">
        <h2 id="winner-text">Someone Wins!</h2>
        <button onclick="resetGame(true)">Play Again</button>
    </div>

    <h1>Chrispen's Checkers</h1>

    <div id="connection-panel">
        <p>Your ID: <strong id="my-id">Generating...</strong></p>
        <input type="text" id="peer-id-input" placeholder="Friend's ID">
        <button onclick="connectToFriend()">Join Game</button>
        <p id="conn-status" style="color: #fbbf24; font-size: 0.9rem; margin-top: 10px;">Offline</p>
    </div>

    <div id="board"></div>
    <p id="status">Waiting for connection...</p>

    <script>
        const boardElement = document.getElementById('board');
        const statusText = document.getElementById('status');
        const myIdDisplay = document.getElementById('my-id');
        const connStatus = document.getElementById('conn-status');
        const winModal = document.getElementById('win-modal');
        const overlay = document.getElementById('overlay');
        const winnerText = document.getElementById('winner-text');
        
        let myName = "";
        let opponentName = "Opponent";
        let peer = null; 
        let conn = null;
        let myRole = null;
        let turn = 'black';
        let selected = null;
        let mustJump = false;

        const initialBoard = [
            [' ', 'r', ' ', 'r', ' ', 'r', ' ', 'r'],
            ['r', ' ', 'r', ' ', 'r', ' ', 'r', ' '],
            [' ', 'r', ' ', 'r', ' ', 'r', ' ', 'r'],
            [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
            [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
            ['b', ' ', 'b', ' ', 'b', ' ', 'b', ' '],
            [' ', 'b', ' ', 'b', ' ', 'b', ' ', 'b'],
            ['b', ' ', 'b', ' ', 'b', ' ', 'b', ' ']
        ];
        let boardState = JSON.parse(JSON.stringify(initialBoard));

        function saveName() {
            const input = document.getElementById('user-name-input').value;
            if (!input.trim()) return alert("Please enter a name!");
            myName = input;
            document.getElementById('setup-screen').style.display = 'none';
            initPeer();
        }

        function initPeer() {
            const shortId = Math.floor(1000 + Math.random() * 9000).toString();
            peer = new Peer(shortId); 
            
            peer.on('open', (id) => { 
                myIdDisplay.innerText = id; 
                connStatus.innerText = "Online. Send ID to friend.";
            });

            peer.on('connection', (connection) => {
                conn = connection;
                myRole = 'black';
                handleData();
            });

            peer.on('error', (err) => {
                if(err.type === 'unavailable-id') initPeer();
                else connStatus.innerText = "Connection Error. Refresh.";
            });
        }

        function connectToFriend() {
            const peerId = document.getElementById('peer-id-input').value;
            if(!peerId) return;
            conn = peer.connect(peerId);
            myRole = 'red';
            handleData();
        }

        function handleData() {
            conn.on('open', () => {
                connStatus.innerText = "Syncing...";
                conn.send({ type: 'handshake', name: myName });
            });

            conn.on('data', (data) => {
                console.log("Received:", data);
                if (data.type === 'handshake') {
                    opponentName = data.name;
                    connStatus.innerText = `Playing with ${opponentName}`;
                    if (myRole === 'black') {
                        conn.send({ type: 'handshake', name: myName });
                    }
                    createBoard();
                } else if (data.type === 'move') {
                    boardState = data.board;
                    turn = data.nextTurn;
                    mustJump = data.mustJump;
                    createBoard();
                    checkWinner();
                } else if (data.type === 'reset') {
                    resetGame(false);
                }
            });
        }

        function createBoard() {
            boardElement.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const square = document.createElement('div');
                    square.className = `square ${(r + c) % 2 === 0 ? 'white-sq' : 'black-sq'}`;
                    const char = boardState[r][c];
                    if (char !== ' ') {
                        const piece = document.createElement('div');
                        piece.className = `piece ${char.toLowerCase() === 'b' ? 'black' : 'red'}`;
                        if (char === 'B' || char === 'R') piece.innerText = '👑';
                        square.appendChild(piece);
                    }
                    if (selected && selected.r === r && selected.c === c) square.classList.add('selected');
                    square.onclick = () => handleSquareClick(r, c);
                    boardElement.appendChild(square);
                }
            }
            updateTurnText();
        }

        function updateTurnText() {
            const currentTurnName = (turn === 'black') 
                ? (myRole === 'black' ? myName : opponentName) 
                : (myRole === 'red' ? myName : opponentName);
            
            statusText.innerText = `Turn: ${currentTurnName}`;
            statusText.style.color = (turn === myRole) ? "#769656" : "white";
        }

        function handleSquareClick(r, c) {
            if (!conn || turn !== myRole) return;
            const piece = boardState[r][c];
            if (piece !== ' ' && piece.toLowerCase() === turn[0]) {
                if (mustJump && (selected?.r !== r || selected?.c !== c)) return;
                selected = { r, c };
                createBoard();
                return;
            }
            if (selected) {
                const move = isValidMove(selected.r, selected.c, r, c);
                if (move.valid) {
                    executeMove(selected.r, selected.c, r, c, move.isJump);
                    conn.send({ type: 'move', board: boardState, nextTurn: turn, mustJump: mustJump });
                    checkWinner();
                }
            }
        }

        function isValidMove(r1, c1, r2, c2) {
            const piece = boardState[r1][c1];
            if (boardState[r2][c2] !== ' ') return { valid: false };
            const dr = r2 - r1, dc = c2 - c1;
            const absDr = Math.abs(dr), absDc = Math.abs(dc);
            if (absDr !== absDc) return { valid: false };
            
            if (piece === 'b' && dr > 0) return { valid: false };
            if (piece === 'r' && dr < 0) return { valid: false };

            if (absDr === 1 && !mustJump) return { valid: true, isJump: false };
            if (absDr === 2) {
                const midP = boardState[(r1+r2)/2][(c1+c2)/2];
                if (midP !== ' ' && midP.toLowerCase() !== turn[0]) return { valid: true, isJump: true };
            }
            return { valid: false };
        }

        function executeMove(r1, c1, r2, c2, isJump) {
            let p = boardState[r1][c1];
            boardState[r2][c2] = p;
            boardState[r1][c1] = ' ';
            if (isJump) boardState[(r1+r2)/2][(c1+c2)/2] = ' ';
            if (r2 === 0 && p === 'b') boardState[r2][c2] = 'B';
            if (r2 === 7 && p === 'r') boardState[r2][c2] = 'R';
            
            if (isJump && canJumpAgain(r2, c2)) {
                selected = { r: r2, c: c2 }; mustJump = true;
            } else {
                selected = null; mustJump = false; turn = turn === 'black' ? 'red' : 'black';
            }
            createBoard();
        }

        function canJumpAgain(r, c) {
            const dirs = [[2,2], [2,-2], [-2,2], [-2,-2]];
            return dirs.some(([dr, dc]) => {
                const nr = r+dr, nc = c+dc;
                return nr>=0 && nr<8 && nc>=0 && nc<8 && isValidMove(r,c,nr,nc).isJump;
            });
        }

        function checkWinner() {
            let bCount = 0, rCount = 0;
            boardState.forEach(row => row.forEach(p => {
                if (p.toLowerCase() === 'b') bCount++;
                if (p.toLowerCase() === 'r') rCount++;
            }));
            if (bCount === 0 || rCount === 0) {
                const winName = (bCount === 0) 
                    ? (myRole === 'red' ? myName : opponentName) 
                    : (myRole === 'black' ? myName : opponentName);
                winnerText.innerText = `${winName} Wins!`;
                winModal.style.display = 'block';
                overlay.style.display = 'block';
            }
        }

        function resetGame(sendNotify) {
            boardState = JSON.parse(JSON.stringify(initialBoard));
            turn = 'black'; mustJump = false; selected = null;
            winModal.style.display = 'none'; overlay.style.display = 'none';
            if (sendNotify && conn) conn.send({ type: 'reset' });
            createBoard();
        }
    </script>
</body>
</html>
